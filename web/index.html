<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIP Lounge Entry</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        color: #e2e8f0;
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 35%, #312e81 70%, #0f766e 100%);
        background-size: 200% 200%;
        animation: bgShift 10s ease infinite;
      }
      @keyframes bgShift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.45);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 18px 36px rgba(2, 6, 23, 0.38);
        backdrop-filter: blur(8px);
        color: #0f172a;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: #1d4ed8;
        background: #dbeafe;
        border-radius: 999px;
        padding: 6px 10px;
        margin-bottom: 10px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
        line-height: 1.1;
      }
      .subtitle {
        margin: 0 0 20px;
        color: #475569;
      }
      a.btn {
        width: 100%;
        border-radius: 12px;
        padding: 12px;
        font-size: 15px;
      }
      .hint {
        margin-top: 10px;
        color: #64748b;
        font-size: 13px;
      }
      .actions {
        margin-top: 14px;
        display: grid;
        gap: 10px;
      }
      a.btn {
        display: block;
        text-align: center;
        text-decoration: none;
        font-weight: 700;
        color: #0f172a;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
      }
      a.btn.dark {
        color: #fff;
        border: 0;
        background: linear-gradient(135deg, #4f46e5, #2563eb);
      }
      .admin-url {
        margin-top: 14px;
        padding: 10px;
        border-radius: 10px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e3a8a;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="badge">AIRPORT VIP LOUNGE</div>
        <h1>Welcome</h1>
        <p class="subtitle">Choose where you want to go.</p>

        <div class="actions">
          <a class="btn" href="http://127.0.0.1:8000/web/user.html">User Registration Portal</a>
        </div>

        <div class="admin-url">
          Admin URL: <a href="/web/admin.html">http://127.0.0.1:8000/web/admin.html</a>
        </div>

        <div class="admin-url">
          Airport Employee Gate URL: <a href="/web/gate-live.html">http://127.0.0.1:8000/web/gate-live.html</a>
        </div>

        <div class="hint">Admin and Gate Live Verification are separate operational pages.</div>
      </div>
    </div>
  </body>
</html>
